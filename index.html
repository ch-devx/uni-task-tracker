<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Uni Task Tracker</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="style.css">
</head>
<body>

	<div class="demo-banner" id="demoBanner">
		<span><strong>Read-only demo</strong> — this is a live portfolio demo connected to a real database. Creating, editing, and deleting are disabled.</span>
	</div>

	<div class="menu-overlay" id="menuOverlay"></div>

	<nav class="sidebar" id="sidebar">
		<div class="sidebar-header">
			<span class="sidebar-logo" id="appName">UT</span>
			<button class="sidebar-close" id="sidebarClose">✕</button>
		</div>
		<ul class="sidebar-nav">
			<li><div class="nav-link active" data-view="tasks"><span class="nav-icon">◈</span><span>Tasks</span></div></li>
			<li><div class="nav-link" data-view="subjects"><span class="nav-icon">◇</span><span>Subjects</span></div></li>
			<li><div class="nav-link" data-view="done"><span class="nav-icon">◉</span><span>Completed</span></div></li>
		</ul>
		<div class="sidebar-footer">Portfolio Demo · 2026</div>
	</nav>

	<header class="topbar">
		<button class="hamburger" id="hamburgerBtn">
			<span></span><span></span><span></span>
		</button>
		<h1 class="topbar-title" id="topbarTitle">Tasks</h1>
		<div class="topbar-actions">
			<button class="btn btn-ghost btn-sm" id="topbarAddBtn">+ New</button>
		</div>
	</header>

	<main class="main-content">
		<div class="view active" id="view-tasks">
			<div class="section-header">
				<span class="section-label">Pending</span>
				<span class="section-count" id="tasks-count">—</span>
			</div>
			<div id="tasks-list"><div class="loading"><div class="spinner"></div>Loading...</div></div>
		</div>
		<div class="view" id="view-subjects">
			<div class="section-header">
				<span class="section-label">Your subjects</span>
				<span class="section-count" id="subjects-count">—</span>
			</div>
			<div id="subjects-list"><div class="loading"><div class="spinner"></div>Loading...</div></div>
		</div>
		<div class="view" id="view-done">
			<div class="section-header">
				<span class="section-label">Completed</span>
				<span class="section-count" id="done-count">—</span>
			</div>
			<div id="done-list"><div class="loading"><div class="spinner"></div>Loading...</div></div>
		</div>
	</main>

	<button class="fab" id="fabBtn">+</button>

	<!-- Modal: Task -->
	<div class="modal-overlay" id="taskModal">
		<div class="modal">
			<div class="modal-handle"></div>
			<div class="modal-title" id="taskModalTitle">New task</div>
			<form id="taskForm">
				<input type="hidden" id="editTaskId">
				<div class="form-group">
					<label class="form-label">Title</label>
					<input class="form-input" type="text" id="taskTitle" placeholder="E.g. Databases midterm" required>
				</div>
				<div class="form-group">
					<label class="form-label">Description <span style="font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></label>
					<textarea class="form-textarea" id="taskDesc" placeholder="Topics, instructions, notes..."></textarea>
				</div>
				<div class="form-group">
					<label class="form-label">Subject</label>
					<select class="form-select" id="taskSubject">
						<option value="">No subject</option>
					</select>
				</div>
				<div class="form-group">
					<label class="form-label">Deadline</label>
					<input class="form-input" type="date" id="taskDeadline" required>
				</div>
				<div class="form-actions">
					<button type="button" class="btn btn-danger" id="deleteTaskBtn" style="display:none;margin-right:auto">Delete</button>
					<button type="button" class="btn btn-ghost" id="cancelTaskBtn">Cancel</button>
					<button type="submit" class="btn btn-primary" id="taskSubmitBtn">Create task</button>
				</div>
			</form>
		</div>
	</div>

	<!-- Modal: Subject -->
	<div class="modal-overlay" id="subjectModal">
		<div class="modal">
			<div class="modal-handle"></div>
			<div class="modal-title" id="subjectModalTitle">New subject</div>
			<form id="subjectForm">
				<input type="hidden" id="editSubjectId">
				<div class="form-group">
					<label class="form-label">Name</label>
					<input class="form-input" type="text" id="subjectName" placeholder="E.g. Databases" required>
				</div>
				<div class="form-group">
					<label class="form-label">Color</label>
					<input type="hidden" id="subjectColor" value="#5b8dd9">
					<div class="color-picker-row" id="colorSwatches"></div>
				</div>
				<div class="form-actions">
					<button type="button" class="btn btn-ghost" id="cancelSubjectBtn">Cancel</button>
					<button type="submit" class="btn btn-primary" id="subjectSubmitBtn">Create subject</button>
				</div>
			</form>
		</div>
	</div>

	<div class="toast-container" id="toastContainer"></div>

	<script src="app.js"></script>
</body>
</html>

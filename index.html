<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tareas Uni</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-base:        #0e0e10;
      --bg-surface:     #17171a;
      --bg-elevated:    #1f1f24;
      --bg-hover:       #26262c;
      --border-subtle:  #2a2a31;
      --border-default: #36363f;
      --border-strong:  #4a4a57;
      --text-primary:   #f0f0f2;
      --text-secondary: #9090a0;
      --text-muted:     #5a5a6a;
      --accent:         #d4d0c8;
      --accent-dim:     #8a8680;
      --dot-urgent:     #c0392b;
      --dot-soon:       #d4881a;
      --dot-ok:         #2e7d52;
      --dot-done:       #3a3a44;
      --space-xs: 4px; --space-sm: 8px; --space-md: 16px;
      --space-lg: 24px; --space-xl: 40px;
      --radius-sm: 6px; --radius-md: 10px; --radius-lg: 16px;
      --font: 'Montserrat', sans-serif;
      --transition: 200ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-tap-highlight-color: transparent; }
    body { font-family: var(--font); background: var(--bg-base); color: var(--text-primary); min-height: 100dvh; overflow-x: hidden; }
    a { color: inherit; text-decoration: none; }
    button { font-family: var(--font); cursor: pointer; border: none; background: none; }
    ul { list-style: none; }
    input, textarea, select { font-family: var(--font); font-size: 0.875rem; }

    .menu-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(2px); z-index: 100; opacity: 0; transition: opacity var(--transition); }
    .menu-overlay.active { display: block; opacity: 1; }

    .sidebar { position: fixed; top: 0; left: 0; width: 260px; height: 100dvh; background: var(--bg-surface); border-right: 1px solid var(--border-subtle); z-index: 200; display: flex; flex-direction: column; transform: translateX(-100%); transition: transform 320ms cubic-bezier(0.4, 0, 0.2, 1); padding: var(--space-lg); }
    .sidebar.open { transform: translateX(0); }
    .sidebar-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--space-xl); }
    .sidebar-logo { font-size: 1.1rem; font-weight: 700; letter-spacing: 0.15em; color: var(--accent); }
    .sidebar-close { color: var(--text-muted); font-size: 1rem; padding: var(--space-xs); border-radius: var(--radius-sm); transition: color var(--transition); }
    .sidebar-close:hover { color: var(--text-primary); }
    .sidebar-nav { display: flex; flex-direction: column; gap: var(--space-xs); flex: 1; }
    .nav-link { display: flex; align-items: center; gap: var(--space-md); padding: 12px var(--space-md); border-radius: var(--radius-md); font-size: 0.875rem; font-weight: 500; letter-spacing: 0.03em; color: var(--text-secondary); transition: background var(--transition), color var(--transition); cursor: pointer; border: 1px solid transparent; }
    .nav-link:hover { background: var(--bg-hover); color: var(--text-primary); }
    .nav-link.active { background: var(--bg-elevated); color: var(--text-primary); border-color: var(--border-default); }
    .nav-icon { font-size: 1rem; width: 20px; text-align: center; color: var(--accent-dim); }
    .nav-link.active .nav-icon { color: var(--accent); }
    .sidebar-footer { font-size: 0.7rem; font-weight: 500; letter-spacing: 0.1em; color: var(--text-muted); text-transform: uppercase; padding-top: var(--space-lg); border-top: 1px solid var(--border-subtle); }

    .topbar { position: sticky; top: 0; z-index: 50; display: flex; align-items: center; gap: var(--space-md); padding: var(--space-md) var(--space-lg); background: var(--bg-base); border-bottom: 1px solid var(--border-subtle); min-height: 60px; }
    .hamburger { display: flex; flex-direction: column; justify-content: center; gap: 5px; width: 36px; height: 36px; padding: var(--space-sm); border-radius: var(--radius-sm); flex-shrink: 0; transition: background var(--transition); }
    .hamburger:hover { background: var(--bg-hover); }
    .hamburger span { display: block; width: 18px; height: 1.5px; background: var(--text-secondary); border-radius: 2px; }
    .topbar-title { flex: 1; font-size: 0.9rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
    .topbar-actions { display: flex; align-items: center; gap: var(--space-sm); }

    .main-content { padding: var(--space-lg); max-width: 700px; margin: 0 auto; }
    .view { display: none; }
    .view.active { display: block; animation: fadeInUp 200ms ease; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    .btn { display: inline-flex; align-items: center; gap: var(--space-sm); padding: 10px var(--space-lg); border-radius: var(--radius-md); font-family: var(--font); font-size: 0.8rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; transition: background var(--transition), border-color var(--transition), color var(--transition); border: 1px solid transparent; }
    .btn-primary { background: var(--accent); color: var(--bg-base); border-color: var(--accent); }
    .btn-primary:hover { background: var(--text-primary); border-color: var(--text-primary); }
    .btn-ghost { background: transparent; color: var(--text-secondary); border-color: var(--border-default); }
    .btn-ghost:hover { background: var(--bg-hover); color: var(--text-primary); border-color: var(--border-strong); }
    .btn-danger { background: transparent; color: #c0392b; border-color: #c0392b33; }
    .btn-danger:hover { background: #c0392b18; border-color: #c0392b; }
    .btn-icon { padding: 8px; border-radius: var(--radius-sm); line-height: 1; }
    .btn-sm { padding: 7px 12px; font-size: 0.72rem; }

    .fab { position: fixed; bottom: var(--space-xl); right: var(--space-lg); width: 52px; height: 52px; border-radius: 50%; background: var(--accent); color: var(--bg-base); font-size: 1.5rem; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 24px rgba(0,0,0,0.5); cursor: pointer; border: none; transition: transform var(--transition), background var(--transition); z-index: 40; font-family: var(--font); font-weight: 300; }
    .fab:hover { transform: scale(1.08); background: var(--text-primary); }
    .fab:active { transform: scale(0.96); }

    .task-list, .subject-list { display: flex; flex-direction: column; gap: var(--space-sm); }
    .task-card { display: flex; align-items: flex-start; gap: var(--space-md); padding: var(--space-md); background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); transition: border-color var(--transition), background var(--transition); position: relative; overflow: hidden; }
    .task-card:hover { border-color: var(--border-default); background: var(--bg-elevated); }
    .task-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--subject-color, var(--border-default)); border-radius: 3px 0 0 3px; }
    .task-check { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid var(--border-strong); flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center; transition: border-color var(--transition), background var(--transition); cursor: pointer; }
    .task-check:hover { border-color: var(--accent); }
    .task-card.done .task-check { background: var(--dot-done); border-color: var(--dot-done); }
    .task-card.done .task-check::after { content: '✓'; font-size: 0.65rem; color: var(--text-muted); }
    .task-body { flex: 1; min-width: 0; cursor: pointer; }
    .task-title { font-size: 0.9rem; font-weight: 500; margin-bottom: 4px; line-height: 1.4; }
    .task-card.done .task-title { text-decoration: line-through; color: var(--text-muted); }
    .task-meta { display: flex; align-items: center; gap: var(--space-sm); flex-wrap: wrap; }
    .task-subject { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }
    .task-date { font-size: 0.72rem; color: var(--text-muted); }
    .urgency-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 6px; }
    .urgency-dot.urgent { background: var(--dot-urgent); box-shadow: 0 0 6px var(--dot-urgent); }
    .urgency-dot.soon { background: var(--dot-soon); box-shadow: 0 0 6px var(--dot-soon); }
    .urgency-dot.ok { background: var(--dot-ok); }
    .urgency-dot.done { background: var(--dot-done); }

    .empty-state { display: flex; flex-direction: column; align-items: center; padding: var(--space-xl) var(--space-lg); text-align: center; gap: var(--space-md); }
    .empty-icon { font-size: 2.5rem; opacity: 0.2; }
    .empty-title { font-size: 0.9rem; font-weight: 600; color: var(--text-secondary); letter-spacing: 0.05em; }
    .empty-sub { font-size: 0.8rem; color: var(--text-muted); }

    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--space-lg); }
    .section-label { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-muted); }
    .section-count { font-size: 0.7rem; font-weight: 600; color: var(--text-muted); background: var(--bg-elevated); border: 1px solid var(--border-subtle); padding: 2px 8px; border-radius: 20px; }

    .subject-card { display: flex; align-items: center; gap: var(--space-md); padding: var(--space-md); background: var(--bg-surface); border: 1px solid var(--border-subtle); border-radius: var(--radius-md); transition: border-color var(--transition); }
    .subject-card:hover { border-color: var(--border-default); }
    .subject-color-bar { width: 4px; height: 36px; border-radius: 4px; flex-shrink: 0; }
    .subject-name { flex: 1; font-size: 0.9rem; font-weight: 500; }
    .subject-actions { display: flex; gap: var(--space-xs); }

    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 300; align-items: flex-end; justify-content: center; }
    .modal-overlay.active { display: flex; animation: fadeIn 150ms ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .modal { background: var(--bg-surface); border: 1px solid var(--border-default); border-radius: var(--radius-lg) var(--radius-lg) 0 0; padding: var(--space-lg); width: 100%; max-width: 600px; max-height: 90dvh; overflow-y: auto; animation: slideUp 220ms cubic-bezier(0.4, 0, 0.2, 1); }
    .modal-handle { width: 36px; height: 4px; background: var(--border-strong); border-radius: 2px; margin: 0 auto var(--space-lg); }
    .modal-title { font-size: 1rem; font-weight: 600; letter-spacing: 0.05em; margin-bottom: var(--space-lg); }
    .form-group { margin-bottom: var(--space-md); }
    .form-label { display: block; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: var(--space-sm); }
    .form-input, .form-select, .form-textarea { width: 100%; background: var(--bg-elevated); border: 1px solid var(--border-default); border-radius: var(--radius-sm); padding: 10px var(--space-md); color: var(--text-primary); font-size: 0.875rem; transition: border-color var(--transition); outline: none; appearance: none; }
    .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--accent-dim); }
    .form-textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.5); cursor: pointer; }
    .form-select option { background: var(--bg-elevated); color: var(--text-primary); }
    .color-picker-row { display: flex; gap: var(--space-sm); flex-wrap: wrap; }
    .color-swatch { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: border-color var(--transition), transform var(--transition); }
    .color-swatch:hover { transform: scale(1.1); }
    .color-swatch.selected { border-color: var(--text-primary); }
    .form-actions { display: flex; gap: var(--space-sm); justify-content: flex-end; margin-top: var(--space-lg); padding-top: var(--space-lg); border-top: 1px solid var(--border-subtle); }

    .loading { display: flex; align-items: center; justify-content: center; padding: var(--space-xl); color: var(--text-muted); font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase; }
    .spinner { width: 16px; height: 16px; border: 2px solid var(--border-default); border-top-color: var(--accent-dim); border-radius: 50%; animation: spin 600ms linear infinite; margin-right: var(--space-sm); }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast-container { position: fixed; bottom: var(--space-xl); left: 50%; transform: translateX(-50%); z-index: 500; display: flex; flex-direction: column; gap: var(--space-sm); pointer-events: none; }
    .toast { background: var(--bg-elevated); border: 1px solid var(--border-default); border-radius: var(--radius-md); padding: 10px var(--space-lg); font-size: 0.8rem; font-weight: 500; white-space: nowrap; animation: toastIn 200ms ease, toastOut 200ms ease 2.5s forwards; }
    @keyframes toastIn  { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; } }
    @keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }

    @media (min-width: 640px) {
      .main-content { padding: var(--space-xl); }
      .modal { border-radius: var(--radius-lg); margin-bottom: var(--space-xl); }
      .modal-overlay { align-items: center; }
    }
  </style>
</head>
<body>

<div class="menu-overlay" id="menuOverlay"></div>

<nav class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <span class="sidebar-logo" id="appName">TU</span>
    <button class="sidebar-close" id="sidebarClose">✕</button>
  </div>
  <ul class="sidebar-nav">
    <li><div class="nav-link active" data-view="tasks"><span class="nav-icon">◈</span><span>Tareas</span></div></li>
    <li><div class="nav-link" data-view="subjects"><span class="nav-icon">◇</span><span>Materias</span></div></li>
    <li><div class="nav-link" data-view="done"><span class="nav-icon">◉</span><span>Completadas</span></div></li>
  </ul>
  <div class="sidebar-footer">UNEFA · 2026</div>
</nav>

<header class="topbar">
  <button class="hamburger" id="hamburgerBtn">
    <span></span><span></span><span></span>
  </button>
  <h1 class="topbar-title" id="topbarTitle">Tareas</h1>
  <div class="topbar-actions">
    <button class="btn btn-ghost btn-sm" id="topbarAddBtn">+ Nueva</button>
  </div>
</header>

<main class="main-content">
  <div class="view active" id="view-tasks">
    <div class="section-header">
      <span class="section-label">Pendientes</span>
      <span class="section-count" id="tasks-count">—</span>
    </div>
    <div id="tasks-list"><div class="loading"><div class="spinner"></div>Cargando...</div></div>
  </div>
  <div class="view" id="view-subjects">
    <div class="section-header">
      <span class="section-label">Tus materias</span>
      <span class="section-count" id="subjects-count">—</span>
    </div>
    <div id="subjects-list"><div class="loading"><div class="spinner"></div>Cargando...</div></div>
  </div>
  <div class="view" id="view-done">
    <div class="section-header">
      <span class="section-label">Completadas</span>
      <span class="section-count" id="done-count">—</span>
    </div>
    <div id="done-list"><div class="loading"><div class="spinner"></div>Cargando...</div></div>
  </div>
</main>

<button class="fab" id="fabBtn">+</button>

<!-- Modal: Tarea -->
<div class="modal-overlay" id="taskModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="taskModalTitle">Nueva tarea</div>
    <form id="taskForm">
      <input type="hidden" id="editTaskId">
      <div class="form-group">
        <label class="form-label">Título</label>
        <input class="form-input" type="text" id="taskTitle" placeholder="Ej. Parcial de Bases de Datos" required>
      </div>
      <div class="form-group">
        <label class="form-label">Descripción <span style="font-weight:400;text-transform:none;letter-spacing:0">(opcional)</span></label>
        <textarea class="form-textarea" id="taskDesc" placeholder="Temas, instrucciones, notas..."></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Materia</label>
        <select class="form-select" id="taskSubject">
          <option value="">Sin materia</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Deadline</label>
        <input class="form-input" type="date" id="taskDeadline" required>
      </div>
      <div class="form-actions">
        <button type="button" class="btn btn-danger" id="deleteTaskBtn" style="display:none;margin-right:auto">Eliminar</button>
        <button type="button" class="btn btn-ghost" id="cancelTaskBtn">Cancelar</button>
        <button type="submit" class="btn btn-primary" id="taskSubmitBtn">Crear tarea</button>
      </div>
    </form>
  </div>
</div>

<!-- Modal: Materia -->
<div class="modal-overlay" id="subjectModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="subjectModalTitle">Nueva materia</div>
    <form id="subjectForm">
      <input type="hidden" id="editSubjectId">
      <div class="form-group">
        <label class="form-label">Nombre</label>
        <input class="form-input" type="text" id="subjectName" placeholder="Ej. Bases de Datos" required>
      </div>
      <div class="form-group">
        <label class="form-label">Color</label>
        <input type="hidden" id="subjectColor" value="#5b8dd9">
        <div class="color-picker-row" id="colorSwatches"></div>
      </div>
      <div class="form-actions">
        <button type="button" class="btn btn-ghost" id="cancelSubjectBtn">Cancelar</button>
        <button type="submit" class="btn btn-primary" id="subjectSubmitBtn">Crear materia</button>
      </div>
    </form>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
const API    = 'https://uni-tasks-worker.tareas-uni.workers.dev';
const COLORS = ['#5b8dd9','#4caf82','#d97b5b','#c96b8a','#7b6dd9','#d9c45b','#5bbcd9','#9b9b9b','#c0392b','#27ae60'];

let subjects    = [];
let currentView = 'tasks';

// ── API ──────────────────────────────────────────────────────
async function apiFetch(path, opts = {}) {
  const res = await fetch(API + path, { headers: {'Content-Type':'application/json'}, ...opts });
  if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.error || 'Error'); }
  return res.json();
}

// ── Toast ────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.getElementById('toastContainer').appendChild(t);
  setTimeout(() => t.remove(), 2800);
}

// ── Sidebar ──────────────────────────────────────────────────
const sidebar     = document.getElementById('sidebar');
const menuOverlay = document.getElementById('menuOverlay');

document.getElementById('hamburgerBtn').onclick = () => {
  sidebar.classList.add('open'); menuOverlay.classList.add('active'); document.body.style.overflow = 'hidden';
};
function closeSidebar() {
  sidebar.classList.remove('open'); menuOverlay.classList.remove('active'); document.body.style.overflow = '';
}
document.getElementById('sidebarClose').onclick = closeSidebar;
menuOverlay.onclick = closeSidebar;
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeSidebar(); });

// ── Navigation ───────────────────────────────────────────────
const viewTitles = { tasks:'Tareas', subjects:'Materias', done:'Completadas' };

document.querySelectorAll('.nav-link[data-view]').forEach(link => {
  link.onclick = () => { switchView(link.dataset.view); closeSidebar(); };
});

function switchView(view) {
  currentView = view;
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + view).classList.add('active');
  document.querySelectorAll('.nav-link[data-view]').forEach(l => l.classList.toggle('active', l.dataset.view === view));
  document.getElementById('topbarTitle').textContent = viewTitles[view];
  const fab = document.getElementById('fabBtn');
  const btn = document.getElementById('topbarAddBtn');
  if (view === 'done') { fab.style.display = 'none'; btn.style.display = 'none'; }
  else { fab.style.display = 'flex'; btn.style.display = 'inline-flex'; }
  if (view === 'subjects') { fab.onclick = () => openSubjectModal(); btn.onclick = () => openSubjectModal(); }
  else { fab.onclick = () => openTaskModal(); btn.onclick = () => openTaskModal(); }
  loadView(view);
}

async function loadView(v) {
  if (v === 'tasks')    loadTasks();
  if (v === 'subjects') loadSubjects();
  if (v === 'done')     loadDone();
}

// ── Date helpers ─────────────────────────────────────────────
function formatDeadline(d) {
  const today    = new Date(); today.setHours(0,0,0,0);
  const deadline = new Date(d);
  deadline.setHours(0,0,0,0);
  const diff     = Math.round((deadline - today) / 86400000);
  if (diff < 0)   return `Venció hace ${Math.abs(diff)} día${Math.abs(diff)!==1?'s':''}`;
  if (diff === 0) return 'Vence hoy';
  if (diff === 1) return 'Mañana';
  return deadline.toLocaleDateString('es-VE', { day:'2-digit', month:'short' });
}
function urgencyClass(d, status) {
  if (status === 'done') return 'done';
  const today    = new Date(); today.setHours(0,0,0,0);
  const deadline = new Date(d);
  deadline.setHours(0,0,0,0);
  const diff     = Math.round((deadline - today) / 86400000);
  return diff <= 0 ? 'urgent' : diff <= 3 ? 'soon' : 'ok';
}

// ── Tasks ────────────────────────────────────────────────────
async function loadTasks() {
  const el = document.getElementById('tasks-list');
  el.innerHTML = loading();
  try {
    const tasks = await apiFetch('/tasks');
    document.getElementById('tasks-count').textContent = tasks.length;
    if (!tasks.length) { el.innerHTML = emptyState('◈','Sin tareas pendientes','Presiona "+ Nueva" para agregar'); return; }
    el.innerHTML = '';
    const list = document.createElement('div'); list.className = 'task-list';
    tasks.forEach(t => list.appendChild(buildTaskCard(t)));
    el.appendChild(list);
  } catch(e) { el.innerHTML = emptyState('⚠','Error al cargar', e.message); }
}

async function loadDone() {
  const el = document.getElementById('done-list');
  el.innerHTML = loading();
  try {
    const tasks = await apiFetch('/tasks/done');
    document.getElementById('done-count').textContent = tasks.length;
    if (!tasks.length) { el.innerHTML = emptyState('◉','Nada por aquí todavía','Las tareas completadas aparecerán acá'); return; }
    el.innerHTML = '';
    const list = document.createElement('div'); list.className = 'task-list';
    tasks.forEach(t => list.appendChild(buildTaskCard(t, true)));
    el.appendChild(list);
  } catch(e) { el.innerHTML = emptyState('⚠','Error al cargar', e.message); }
}

function buildTaskCard(task, isDone = false) {
  const card = document.createElement('div');
  card.className = 'task-card' + (isDone ? ' done' : '');
  card.dataset.taskId = task.id;
  card.style.setProperty('--subject-color', task.subject_color || '#36363f');
  const u = urgencyClass(task.deadline, task.status);
  const subHtml = task.subject_name
    ? `<span class="task-subject" style="color:${task.subject_color}">${esc(task.subject_name)}</span><span class="task-date">·</span>`
    : '';
  card.innerHTML = `
    <div class="task-check"></div>
    <div class="task-body">
      <div class="task-title">${esc(task.title)}</div>
      <div class="task-meta">${subHtml}<span class="task-date">${formatDeadline(task.deadline)}</span></div>
    </div>
    <div class="urgency-dot ${u}"></div>`;
  card.querySelector('.task-check').onclick = () => toggleTask(task.id, card);
  card.querySelector('.task-body').onclick   = () => openTaskModal(task);
  return card;
}

async function toggleTask(id, card) {
  try {
    const task = await apiFetch(`/tasks/${id}/toggle`, { method:'PATCH' });
    if (task.status === 'done') {
      card.classList.add('done');
      showToast('Tarea completada ✓');
      setTimeout(() => {
        card.style.cssText += 'opacity:0;transform:translateX(8px);transition:all 300ms ease';
        setTimeout(() => { card.remove(); loadTasks(); }, 300);
      }, 600);
    } else { card.classList.remove('done'); loadDone(); }
  } catch { showToast('Error al actualizar'); }
}

// ── Subjects ─────────────────────────────────────────────────
async function loadSubjects() {
  const el = document.getElementById('subjects-list');
  el.innerHTML = loading();
  try {
    subjects = await apiFetch('/subjects');
    document.getElementById('subjects-count').textContent = subjects.length;
    populateSubjectSelect();
    if (!subjects.length) { el.innerHTML = emptyState('◇','Sin materias','Agrega tus materias del semestre'); return; }
    el.innerHTML = '';
    const list = document.createElement('div'); list.className = 'subject-list';
    subjects.forEach(s => {
      const card = document.createElement('div');
      card.className = 'subject-card';
      card.innerHTML = `
        <div class="subject-color-bar" style="background:${s.color}"></div>
        <span class="subject-name">${esc(s.name)}</span>
        <div class="subject-actions">
          <button class="btn btn-ghost btn-icon">✎</button>
          <button class="btn btn-danger btn-icon">✕</button>
        </div>`;
      card.querySelectorAll('button')[0].onclick = () => openSubjectModal(s);
      card.querySelectorAll('button')[1].onclick = () => deleteSubject(s.id, card);
      list.appendChild(card);
    });
    el.appendChild(list);
  } catch(e) { el.innerHTML = emptyState('⚠','Error al cargar', e.message); }
}

function populateSubjectSelect() {
  const sel = document.getElementById('taskSubject');
  const cur = sel.value;
  sel.innerHTML = '<option value="">Sin materia</option>';
  subjects.forEach(s => { const o = document.createElement('option'); o.value = s.id; o.textContent = s.name; sel.appendChild(o); });
  sel.value = cur;
}

async function deleteSubject(id, card) {
  if (!confirm('¿Eliminar esta materia?')) return;
  try {
    await apiFetch(`/subjects/${id}`, { method:'DELETE' });
    card.style.cssText += 'opacity:0;transition:opacity 200ms ease';
    setTimeout(() => { card.remove(); loadSubjects(); }, 200);
    showToast('Materia eliminada');
  } catch { showToast('Error al eliminar'); }
}

// ── Modals ───────────────────────────────────────────────────
function openModal(id) {
  const m = document.getElementById(id);
  m.classList.add('active'); document.body.style.overflow = 'hidden';
  setTimeout(() => m.querySelector('input,select,textarea')?.focus(), 100);
}
function closeModal(id) {
  document.getElementById(id).classList.remove('active'); document.body.style.overflow = '';
}
document.querySelectorAll('.modal-overlay').forEach(o => {
  o.onclick = e => { if (e.target === o) closeModal(o.id); };
});

// Task modal
function openTaskModal(task = null) {
  document.getElementById('editTaskId').value       = task ? task.id : '';
  document.getElementById('taskTitle').value        = task ? task.title : '';
  document.getElementById('taskDesc').value         = task ? (task.description || '') : '';
  document.getElementById('taskDeadline').value     = task ? task.deadline : '';
  document.getElementById('taskModalTitle').textContent  = task ? 'Editar tarea' : 'Nueva tarea';
  document.getElementById('taskSubmitBtn').textContent   = task ? 'Guardar cambios' : 'Crear tarea';
  document.getElementById('deleteTaskBtn').style.display = task ? 'inline-flex' : 'none';
  populateSubjectSelect();
  document.getElementById('taskSubject').value = task ? (task.subject_id || '') : '';
  openModal('taskModal');
}

document.getElementById('cancelTaskBtn').onclick    = () => closeModal('taskModal');
document.getElementById('deleteTaskBtn').onclick    = async () => {
  const id = document.getElementById('editTaskId').value;
  if (!id || !confirm('¿Eliminar esta tarea?')) return;
  try { await apiFetch(`/tasks/${id}`, {method:'DELETE'}); closeModal('taskModal'); showToast('Tarea eliminada'); loadTasks(); }
  catch { showToast('Error al eliminar'); }
};

document.getElementById('taskForm').onsubmit = async e => {
  e.preventDefault();
  const id  = document.getElementById('editTaskId').value;
  const sub = document.getElementById('taskSubject').value;
  const payload = {
    title:       document.getElementById('taskTitle').value.trim(),
    description: document.getElementById('taskDesc').value.trim() || null,
    subject_id:  sub ? parseInt(sub) : null,
    deadline:    document.getElementById('taskDeadline').value,
    status:      'pending',
  };
  try {
    if (id) { await apiFetch(`/tasks/${id}`, {method:'PUT', body:JSON.stringify(payload)}); showToast('Tarea actualizada'); }
    else    { await apiFetch('/tasks',        {method:'POST',body:JSON.stringify(payload)}); showToast('Tarea creada'); }
    closeModal('taskModal'); loadTasks();
  } catch(err) { showToast(err.message); }
};

// Subject modal
function openSubjectModal(subject = null) {
  document.getElementById('editSubjectId').value        = subject ? subject.id : '';
  document.getElementById('subjectName').value          = subject ? subject.name : '';
  document.getElementById('subjectColor').value         = subject ? subject.color : COLORS[0];
  document.getElementById('subjectModalTitle').textContent = subject ? 'Editar materia' : 'Nueva materia';
  document.getElementById('subjectSubmitBtn').textContent  = subject ? 'Guardar cambios' : 'Crear materia';
  renderSwatches(subject ? subject.color : COLORS[0]);
  openModal('subjectModal');
}

function renderSwatches(selected) {
  const c = document.getElementById('colorSwatches'); c.innerHTML = '';
  COLORS.forEach(color => {
    const s = document.createElement('div');
    s.className = 'color-swatch' + (color === selected ? ' selected' : '');
    s.style.background = color; s.dataset.color = color;
    s.onclick = () => {
      c.querySelectorAll('.color-swatch').forEach(x => x.classList.remove('selected'));
      s.classList.add('selected');
      document.getElementById('subjectColor').value = color;
    };
    c.appendChild(s);
  });
}

document.getElementById('cancelSubjectBtn').onclick = () => closeModal('subjectModal');
document.getElementById('subjectForm').onsubmit = async e => {
  e.preventDefault();
  const id = document.getElementById('editSubjectId').value;
  const payload = { name: document.getElementById('subjectName').value.trim(), color: document.getElementById('subjectColor').value };
  try {
    if (id) { await apiFetch(`/subjects/${id}`, {method:'PUT', body:JSON.stringify(payload)}); showToast('Materia actualizada'); }
    else    { await apiFetch('/subjects',        {method:'POST',body:JSON.stringify(payload)}); showToast('Materia creada'); }
    closeModal('subjectModal'); loadSubjects();
  } catch(err) { showToast(err.message); }
};

// ── Helpers ──────────────────────────────────────────────────
function loading() { return '<div class="loading"><div class="spinner"></div>Cargando...</div>'; }
function emptyState(icon, title, sub = '') {
  return `<div class="empty-state"><div class="empty-icon">${icon}</div><div class="empty-title">${title}</div>${sub ? `<div class="empty-sub">${sub}</div>` : ''}</div>`;
}

// ── Init ─────────────────────────────────────────────────────
document.getElementById('fabBtn').onclick    = () => openTaskModal();
document.getElementById('topbarAddBtn').onclick = () => openTaskModal();
loadSubjects().then(() => loadTasks());
</script>
</body>
</html>
